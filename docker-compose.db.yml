# Solo base de datos PostgreSQL (sin la API).
# Uso: docker compose -f docker-compose.db.yml up -d

services:
  db:
    image: postgres:16-alpine
    container_name: api-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-api_secret}
      POSTGRES_DB: ${POSTGRES_DB:-api_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-api} -d ${POSTGRES_DB:-api_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
