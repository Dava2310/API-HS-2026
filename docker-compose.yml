services:
  db:
    image: postgres:16-alpine
    container_name: api-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-api_secret}
      POSTGRES_DB: ${POSTGRES_DB:-api_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Host port 5433 to avoid conflict with local Postgres on 5432
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-api} -d ${POSTGRES_DB:-api_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-app
    restart: unless-stopped
    # Optional: add "env_file: [.env]" to pass SMTP, JWT, CORS, etc.
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3333}
      # Override DATABASE_URL so the app connects to the Postgres container
      DATABASE_URL: postgresql://${POSTGRES_USER:-api}:${POSTGRES_PASSWORD:-api_secret}@db:5432/${POSTGRES_DB:-api_db}
    ports:
      - "${PORT:-3333}:3333"

volumes:
  postgres_data:
